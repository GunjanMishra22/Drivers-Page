<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roshi Transport Corporation - Load Board</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #F5A623;
            --gold-light: #FFD166;
            --gold-dark: #C47D0E;
            --ink: #1A1209;
            --ink-mid: #3D2B0F;
            --ink-soft: #7A5C34;
            --cream: #FDFAF4;
            --cream-mid: #F5EDD8;
            --cream-dark: #EAD9BA;
            --green: #2ECC71;
            --green-bg: #E8FBF1;
            --orange: #E67E22;
            --orange-bg: #FEF3E8;
            --slate: #636E72;
            --slate-bg: #F0F2F3;
            --blue: #2980B9;
            --whatsapp: #25D366;
            --gmail: #EA4335;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow-sm: 0 2px 8px rgba(26,18,9,0.07);
            --shadow-md: 0 6px 24px rgba(26,18,9,0.1);
            --shadow-lg: 0 16px 48px rgba(26,18,9,0.14);
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            padding: 0;
            color: var(--ink);
        }

        /* ─── HEADER ─────────────────────────────────── */
        .header {
            background: var(--ink);
            padding: 0;
            position: relative;
            overflow: hidden;
        }

        .header-inner {
            max-width: 1100px;
            margin: 0 auto;
            padding: 44px 32px 36px;
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .header-bg-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle at 80% 50%, rgba(245,166,35,0.15) 0%, transparent 60%),
                              radial-gradient(circle at 10% 80%, rgba(245,166,35,0.08) 0%, transparent 50%);
            z-index: 1;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-mark {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(245,166,35,0.35);
            background: #F5A623;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-mark svg {
            width: 100%;
            height: 100%;
        }

        .header-text h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.65em;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
            line-height: 1.15;
        }

        .header-text p {
            font-size: 0.85em;
            color: rgba(255,255,255,0.45);
            margin-top: 4px;
            font-weight: 400;
        }

        .header-tag {
            background: rgba(245,166,35,0.15);
            border: 1px solid rgba(245,166,35,0.3);
            color: var(--gold-light);
            font-size: 0.75em;
            font-weight: 600;
            padding: 6px 14px;
            border-radius: 100px;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        /* ─── MAIN CONTENT ───────────────────────────── */
        .main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px 60px;
        }

        .refresh-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 32px;
            padding: 12px 18px;
            background: white;
            border-radius: var(--radius-sm);
            border: 1px solid var(--cream-dark);
            box-shadow: var(--shadow-sm);
        }

        .refresh-bar .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s infinite;
            margin-right: 8px;
            flex-shrink: 0;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }

        .refresh-bar-left {
            display: flex;
            align-items: center;
            font-size: 0.82em;
            color: var(--ink-soft);
            font-weight: 500;
        }

        .refresh-bar-right {
            font-size: 0.78em;
            color: var(--ink-soft);
        }

        /* ─── SECTION ────────────────────────────────── */
        .section {
            margin-bottom: 44px;
        }

        .section-title-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .section-title-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .section-title-icon.available { background: var(--green-bg); }
        .section-title-icon.booked { background: var(--orange-bg); }

        .section-title-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.2em;
            font-weight: 600;
            color: var(--ink);
            flex: 1;
        }

        .count-pill {
            background: var(--ink);
            color: var(--gold-light);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82em;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 100px;
            min-width: 36px;
            text-align: center;
        }

        .section-divider {
            height: 2px;
            background: linear-gradient(90deg, var(--cream-dark) 0%, transparent 100%);
            margin-bottom: 20px;
        }

        /* ─── LOAD CARDS GRID ────────────────────────── */
        .loads-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 18px;
        }

        /* ─── LOAD CARD ──────────────────────────────── */
        .load-card {
            background: #fff;
            border: 1px solid var(--cream-dark);
            border-radius: var(--radius);
            padding: 0;
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            display: flex;
            flex-direction: column;
        }

        .load-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-md);
        }

        /* Card top accent strip */
        .card-accent {
            height: 4px;
            width: 100%;
        }

        .card-accent.available { background: linear-gradient(90deg, #2ECC71, #27AE60); }
        .card-accent.booked    { background: linear-gradient(90deg, #E67E22, #D35400); }
        .card-accent.completed { background: linear-gradient(90deg, #95A5A6, #7F8C8D); }

        .card-body {
            padding: 20px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Route row */
        .route-row {
            display: flex;
            align-items: stretch;
            gap: 0;
        }

        .route-city {
            flex: 1;
            min-width: 0;
        }

        .route-label {
            font-size: 0.68em;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 4px;
        }

        .route-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.05em;
            font-weight: 600;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .route-arrow-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 14px;
            gap: 3px;
        }

        .route-arrow-line {
            width: 36px;
            height: 2px;
            background: var(--cream-dark);
            position: relative;
        }

        .route-arrow-line::after {
            content: '';
            position: absolute;
            right: -1px;
            top: 50%;
            transform: translateY(-50%);
            border-left: 6px solid var(--gold);
            border-top: 4px solid transparent;
            border-bottom: 4px solid transparent;
        }

        .route-arrow-icon {
            font-size: 0.8em;
        }

        /* Status badge inline */
        .status-inline {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px 4px 8px;
            border-radius: 100px;
            font-size: 0.75em;
            font-weight: 600;
            letter-spacing: 0.3px;
            align-self: flex-start;
        }

        .status-inline .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        .status-inline.available {
            background: var(--green-bg);
            color: #1B8A4C;
        }
        .status-inline.available .status-dot { background: var(--green); }

        .status-inline.booked {
            background: var(--orange-bg);
            color: var(--orange);
        }
        .status-inline.booked .status-dot { background: var(--orange); }

        .status-inline.completed {
            background: var(--slate-bg);
            color: var(--slate);
        }
        .status-inline.completed .status-dot { background: var(--slate); }

        /* Details grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: var(--cream);
            border-radius: var(--radius-sm);
            padding: 14px 16px;
        }

        .detail-cell {}

        .detail-cell .d-label {
            font-size: 0.68em;
            font-weight: 600;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: var(--ink-soft);
            margin-bottom: 3px;
        }

        .detail-cell .d-val {
            font-size: 0.9em;
            font-weight: 600;
            color: var(--ink);
        }

        .detail-cell.amount-cell .d-val {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1em;
            color: var(--gold-dark);
            font-weight: 700;
        }

        /* Contact buttons */
        .card-footer {
            padding: 14px 22px;
            border-top: 1px solid var(--cream-dark);
            display: flex;
            gap: 8px;
        }

        .contact-btn {
            flex: 1;
            padding: 10px 12px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            text-align: center;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-call {
            background: var(--blue);
        }

        .btn-call:hover { background: #1A6FA0; transform: translateY(-1px); }

        .btn-whatsapp {
            background: var(--whatsapp);
        }

        .btn-whatsapp:hover { background: #1DAA56; transform: translateY(-1px); }

        .btn-gmail {
            background: var(--gmail);
        }

        .btn-gmail:hover { background: #C5221F; transform: translateY(-1px); }

        /* ─── EMPTY / LOADING STATES ─────────────────── */
        .loading {
            text-align: center;
            padding: 52px 20px;
            color: var(--ink-soft);
        }

        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--cream-dark);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            font-size: 0.9em;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 56px 20px;
            color: var(--ink-soft);
        }

        .empty-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: var(--cream-mid);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 16px;
        }

        .empty-state p {
            font-size: 0.95em;
            font-weight: 500;
        }

        .error-state {
            text-align: center;
            padding: 40px;
            color: #C0392B;
            background: #FDECEA;
            border-radius: var(--radius-sm);
            border: 1px solid #F1948A;
        }

        .error-state p { font-size: 0.95em; margin-bottom: 6px; font-weight: 500; }
        .error-state small { color: var(--ink-soft); font-size: 0.82em; }

        /* ─── FOOTER ─────────────────────────────────── */
        footer {
            text-align: center;
            padding: 28px 20px;
            color: var(--ink-soft);
            font-size: 0.82em;
            border-top: 1px solid var(--cream-dark);
        }

        footer span {
            color: var(--gold-dark);
            font-weight: 600;
        }

        /* ─── RESPONSIVE ─────────────────────────────── */
        @media (max-width: 700px) {
            .header-inner {
                padding: 28px 20px 24px;
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .header-text h1 { font-size: 1.3em; }

            .main { padding: 20px 16px 48px; }

            .loads-grid {
                grid-template-columns: 1fr;
                gap: 14px;
            }

            .route-name { font-size: 0.95em; }

            .details-grid { gap: 10px; padding: 12px 14px; }

            .card-footer { flex-wrap: wrap; }

            .refresh-bar { flex-direction: column; align-items: flex-start; gap: 4px; }
        }

        @media (min-width: 701px) and (max-width: 900px) {
            .loads-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>

    <!-- MAIN -->
    <div class="main">

        <div class="refresh-bar">
            <div class="refresh-bar-left">
                <div class="dot"></div>
                <span id="lastUpdate">Loading data…</span>
            </div>
            <div class="refresh-bar-right">Auto-refresh every 2 min</div>
        </div>

        <!-- Available Loads -->
        <div class="section">
            <div class="section-title-row">
                <div class="section-title-icon available"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="7" fill="#2ECC71"/><path d="M4.5 8l2.5 2.5 4.5-4.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
                <div class="section-title-text">Available Loads</div>
                <div class="count-pill" id="availableCount">0</div>
            </div>
            <div class="section-divider"></div>
            <div class="loads-grid" id="availableLoads">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Fetching available loads…</p>
                </div>
            </div>
        </div>

        <!-- Booked & Completed -->
        <div class="section">
            <div class="section-title-row">
                <div class="section-title-icon booked"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" fill="#E67E22"/><path d="M6 6h4M6 9h4M6 12h2" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg></div>
                <div class="section-title-text">Booked &amp; Completed</div>
                <div class="count-pill" id="completedCount">0</div>
            </div>
            <div class="section-divider"></div>
            <div class="loads-grid" id="completedLoads">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Fetching booked &amp; completed…</p>
                </div>
            </div>
        </div>

    </div>

    <footer>
        © 2025 <span>Roshi Transport Corporation</span>. All rights reserved.
    </footer>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtrejgwCaNSFPZm-uahEMbmPS5Ekj9d9kjnS4-HetyksppqNEqai6ixLMHYUyZI28c13tlVp0EQ1iw/pub?gid=0&single=true&output=csv';
        const PHONE = '8290043074';
        const WHATSAPP = '9672035881';
        const EMAIL = 'roshitransportco@gmail.com';
        const REFRESH_INTERVAL = 120000; // 2 minutes

        function parseCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];

            for (let i = 1; i < lines.length; i++) {
                if (lines[i].trim() === '') continue;
                
                const values = lines[i].split(',');
                const row = {};
                
                headers.forEach((header, index) => {
                    row[header] = values[index] ? values[index].trim() : '';
                });
                
                if (row['Status']) {
                    data.push(row);
                }
            }

            return data;
        }

        function getContactButtons(contactType) {
            const buttons = [];
            
            if (contactType.toLowerCase().includes('call')) {
                buttons.push(`<a href="tel:${PHONE}" class="contact-btn btn-call">Call</a>`);
            }
            if (contactType.toLowerCase().includes('whatsapp')) {
                buttons.push(`<a href="https://wa.me/91${WHATSAPP}" target="_blank" class="contact-btn btn-whatsapp">WhatsApp</a>`);
            }
            if (contactType.toLowerCase().includes('gmail')) {
                buttons.push(`<a href="mailto:${EMAIL}" class="contact-btn btn-gmail">Email</a>`);
            }

            return buttons.join('');
        }

        function getStatusClass(status) {
            const s = status.toLowerCase();
            if (s === 'available') return 'available';
            if (s === 'booked') return 'booked';
            if (s === 'completed') return 'completed';
            return 'available';
        }

        function createLoadCard(load) {
            const statusClass = getStatusClass(load['Status']);
            const statusLabel = (load['Status'] || 'N/A').toUpperCase();

            return `
                <div class="load-card">
                    <div class="card-accent ${statusClass}"></div>
                    <div class="card-body">

                        <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
                            <div class="route-row" style="flex:1; min-width:0;">
                                <div class="route-city">
                                    <div class="route-label">Pickup</div>
                                    <div class="route-name" title="${load['Pickup Location'] || 'N/A'}">${load['Pickup Location'] || 'N/A'}</div>
                                </div>
                                <div class="route-arrow-wrap">
                                    <div class="route-arrow-line"></div>
                                </div>
                                <div class="route-city" style="text-align:right;">
                                    <div class="route-label">Drop</div>
                                    <div class="route-name" title="${load['Drop Location'] || 'N/A'}">${load['Drop Location'] || 'N/A'}</div>
                                </div>
                            </div>
                        </div>

                        <div>
                            <span class="status-inline ${statusClass}">
                                <span class="status-dot"></span>
                                ${statusLabel}
                            </span>
                        </div>

                        <div class="details-grid">
                            <div class="detail-cell">
                                <div class="d-label">Load Type</div>
                                <div class="d-val">${load['Load Type'] || 'N/A'}</div>
                            </div>
                            <div class="detail-cell">
                                <div class="d-label">Weight</div>
                                <div class="d-val">${load['Weight'] || 'N/A'}</div>
                            </div>
                            <div class="detail-cell">
                                <div class="d-label">Vehicle</div>
                                <div class="d-val">${load['Vehicle Type'] || 'N/A'}</div>
                            </div>
                            <div class="detail-cell amount-cell">
                                <div class="d-label">Amount</div>
                                <div class="d-val">₹ ${load['Amount'] || 'N/A'}</div>
                            </div>
                        </div>

                    </div>
                    <div class="card-footer">
                        ${getContactButtons(load['Contact'] || '')}
                    </div>
                </div>
            `;
        }

        function updateDashboard(data) {
            const available = data.filter(load => load['Status'].toLowerCase() === 'available');
            const completed = data.filter(load => {
                const status = load['Status'].toLowerCase();
                return status === 'booked' || status === 'completed';
            });

            // Sort by newest first (assuming they're added in order)
            available.reverse();
            completed.reverse();

            // Update counts
            document.getElementById('availableCount').textContent = available.length;
            document.getElementById('completedCount').textContent = completed.length;

            // Update available loads
            const availableContainer = document.getElementById('availableLoads');
            if (available.length === 0) {
                availableContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M3 8l9 6 9-6M3 8v10a2 2 0 002 2h14a2 2 0 002-2V8M3 8a2 2 0 012-2h14a2 2 0 012 2" stroke="#7A5C34" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                        <p>No available loads at the moment</p>
                    </div>
                `;
            } else {
                availableContainer.innerHTML = available.map(createLoadCard).join('');
            }

            // Update completed loads
            const completedContainer = document.getElementById('completedLoads');
            if (completed.length === 0) {
                completedContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon"><svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="10" height="12" rx="2" fill="#E67E22"/><path d="M6 6h4M6 9h4M6 12h2" stroke="white" stroke-width="1.2" stroke-linecap="round"/></svg></div>
                        <p>No booked or completed loads</p>
                    </div>
                `;
            } else {
                completedContainer.innerHTML = completed.map(createLoadCard).join('');
            }

            // Update timestamp
            const now = new Date();
            document.getElementById('lastUpdate').textContent = 
                `Last updated: ${now.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' })}`;
        }

        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL, {
                    method: 'GET',
                    cache: 'no-cache'
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const csv = await response.text();
                
                if (!csv || csv.trim() === '') {
                    throw new Error('Empty response from Google Sheets');
                }
                
                const data = parseCSV(csv);
                updateDashboard(data);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        // Initial load
        fetchData();

        // Auto-refresh every 2 minutes
        setInterval(fetchData, REFRESH_INTERVAL);
    </script>
